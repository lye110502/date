<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>주말 데이트 초대장</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffd6e8, #fff1f7);
      font-family: "Arial", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      width: 330px;
      position: relative;
    }

    h1 {
      color: #ff4f93;
      font-size: 28px;
    }

    p {
      font-size: 18px;
      color: #555;
    }

    button {
      border: none;
      border-radius: 20px;
      padding: 13px 22px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .yes {
      background: #ff6fae;
      color: white;
    }

    .no {
      background: #ddd;
      color: #555;
      position: relative;
    }

    .choice {
      background: #ffe1ef;
      color: #ff3f8b;
      width: 250px;
    }

    button:hover {
      transform: scale(1.08);
    }

    .hidden {
      display: none;
    }

    .heart {
      font-size: 40px;
      animation: beat 0.8s infinite alternate;
    }

    @keyframes beat {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="card" id="first">
    <div class="heart">💗</div>
    <h1>주말에 나랑 만나시겠습니까?</h1>
    <p>거절은… 조금 곤란합니다.</p>
    <button class="yes" onclick="showDate()">예 💕</button>
    <button class="no" id="noBtn" onmouseover="runAway()">아니요</button>
  </div>

  <div class="card hidden" id="second">
    <h1>데이트 코스를 골라주세요</h1>
    <p>신중하게 선택하시오.</p>
    <button class="choice" onclick="finish('맛집 가고 카페 가기')">맛집 + 카페 ☕</button>
    <button class="choice" onclick="finish('영화 보고 산책하기')">영화 + 산책 🎬</button>
  </div>

  <div class="card hidden" id="final">
    <div class="heart">💖</div>
    <h1>데이트 확정!</h1>
    <p id="result"></p>
    <p>그럼 주말에 예쁘게 만나자아</p>
  </div>

  <script>
    function showDate() {
      document.getElementById("first").classList.add("hidden");
      document.getElementById("second").classList.remove("hidden");
    }

    function finish(choice) {
      document.getElementById("second").classList.add("hidden");
      document.getElementById("final").classList.remove("hidden");
      document.getElementById("result").innerText = "선택한 코스: " + choice;
    }

    function runAway() {
      const noBtn = document.getElementById("noBtn");
      const x = Math.random() * 150 - 75;
      const y = Math.random() * 150 - 75;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }
  </script>
</body>
</html>
