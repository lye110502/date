<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>주말 데이트 초대장</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #cceeff, #eef9ff);
      font-family: "Arial", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      width: 330px;
      position: relative;
    }

    h1 {
      color: #3aa7d8;
      font-size: 28px;
    }

    p {
      font-size: 18px;
      color: #555;
    }

    button {
      border: none;
      border-radius: 20px;
      padding: 13px 22px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .yes {
      background: #5bbce8;
      color: white;
    }

    .no {
      background: #ddd;
      color: #555;
      position: fixed;
      z-index: 10;
    }

    .choice {
      background: #e2f6ff;
      color: #2196c9;
      width: 250px;
    }

    button:hover {
      transform: scale(1.08);
    }

    .hidden {
      display: none;
    }

    .heart {
      font-size: 40px;
      animation: beat 0.8s infinite alternate;
    }

    @keyframes beat {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }
  </style>
</head>

<body>
  <div class="card" id="first">
    <div class="heart">💙</div>
    <h1>주말에 나랑 만나시겠습니까?</h1>
    <p>거절은… 조금 곤란합니다.</p>
    <button class="yes" onclick="showDate()">예 💕</button>
    <button class="no" id="noBtn" onmouseover="runAway()" ontouchstart="runAway()" onclick="runAway()">아니요</button>
  </div>

  <div class="card hidden" id="second">
    <h1>뭐 먹을지 골라주세요</h1>
    <p>신중하게 선택하시오.</p>

    <button class="choice" onclick="finish('마라탕')">마라탕 🌶️</button>
<button class="choice" onclick="finish('샤브샤브')">샤브샤브 🍲</button>
<button class="choice" onclick="finish('평김뒷')">평김뒷 🥩</button>
<button class="choice" onclick="finish('갈비')">갈비 🍖</button>
<button class="choice" onclick="finish('쿠우쿠우')">쿠우쿠우 🍣</button>
<button class="choice" onclick="finish('해쉬')">해쉬 🍽️</button>
<button class="choice" onclick="finish('회전쵸밥')">회전쵸밥 🍣</button>
  </div>

  <div class="card hidden" id="final">
    <div class="heart">💙</div>
    <h1>선택 완료!</h1>
    <p id="result"></p>
    <p>예은이에게 전달되었습니다 💌</p>
    <p>그럼 주말에 예쁘게 만나자아</p>
  </div>

  <script>
    function showDate() {
      document.getElementById("first").classList.add("hidden");
      document.getElementById("second").classList.remove("hidden");
    }

    function finish(choice) {
      sendToGoogleForm(choice);

      document.getElementById("second").classList.add("hidden");
      document.getElementById("final").classList.remove("hidden");
      document.getElementById("result").innerText = "선택한 메뉴: " + choice;
    }

    function sendToGoogleForm(choice) {
      const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSd-lRILS-GRZmHb8kAWwT2ueSKNYld12fobFBsHCbMIBYHktA/formResponse";

      const formData = new FormData();
      formData.append("entry.1288520054", choice);

      fetch(formUrl, {
        method: "POST",
        mode: "no-cors",
        body: formData
      });
    }

    function runAway() {
      const noBtn = document.getElementById("noBtn");

      const maxX = window.innerWidth - noBtn.offsetWidth - 20;
      const maxY = window.innerHeight - noBtn.offsetHeight - 20;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }
  </script>
</body>
</html>
